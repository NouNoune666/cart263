<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>My first three.js app</title>
    <style>
        body {
            margin: 0;
        }
    </style>
    <!-- This import map tells the browser WHERE to find Three.js -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/"
      }
    }
    </script>
    <script type="module" src="main.js"></script>
</head>

<body>
    <!-- This is the canvas where Three.js will draw everything -->
    <canvas id="three-ex"></canvas>
</body>

</html>
